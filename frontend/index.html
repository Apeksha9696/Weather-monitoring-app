<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gradient-to-br from-[#FDFFF5] via-[#E8F5E9] to-[#A5D6A7] min-h-screen flex items-center justify-center p-4 font-outfit text-emerald-900">

    <div class="glass-card w-full max-w-md rounded-3xl p-8 shadow-2xl relative overflow-hidden transition-all duration-500">
        <!-- Decorator circles for glassmorphism effect -->
        <div class="absolute -top-16 -left-16 w-32 h-32 bg-emerald-200 opacity-40 rounded-full blur-2xl"></div>
        <div class="absolute -bottom-16 -right-16 w-32 h-32 bg-white opacity-60 rounded-full blur-2xl"></div>
        
        <h1 class="text-3xl font-bold text-center text-emerald-800 mb-6 tracking-wide drop-shadow-sm">Weather<span class="font-light">Info</span></h1>
        
        <form id="weather-form" class="relative mb-8 z-10">
            <input 
                type="text" 
                id="city-input" 
                placeholder="Enter city name..." 
                class="w-full bg-white border border-emerald-200 text-emerald-900 placeholder-emerald-600/70 px-5 py-3 rounded-full outline-none focus:bg-white/90 focus:ring-2 focus:ring-emerald-400 transition-all shadow-sm"
                autocomplete="off"
                required
            >
            <button 
                type="submit" 
                class="absolute right-1 top-1 bottom-1 bg-emerald-600 text-white w-10 rounded-full flex items-center justify-center hover:bg-emerald-700 hover:scale-105 active:scale-95 transition-all shadow-md"
            >
                <i class="fas fa-search"></i>
            </button>
        </form>

        <div id="loading" class="hidden flex-col items-center justify-center py-8 z-10 relative">
            <div class="spinner border-4 border-emerald-200 border-t-emerald-600 w-10 h-10 rounded-full animate-spin"></div>
            <p class="text-emerald-700 mt-4 font-medium animate-pulse">Fetching weather...</p>
        </div>

        <div id="error-message" class="hidden text-center bg-red-50 border border-red-200 text-red-600 p-4 rounded-xl mb-4 z-10 relative backdrop-blur-sm">
            <i class="fas fa-exclamation-circle mb-2 text-2xl text-red-500"></i>
            <p id="error-text">City not found.</p>
        </div>

        <div id="weather-result" class="hidden flex-col items-center z-10 relative fade-in">
            <div class="text-center mb-2">
                <h2 id="city-name" class="text-4xl font-bold text-emerald-900 tracking-wide">London</h2>
                <p id="weather-desc" class="text-emerald-700 capitalize text-lg font-medium tracking-wide mt-1">Light Rain</p>
            </div>
            
            <div class="flex items-center justify-center my-4">
                <!-- Removed filter-white class so the original OpenWeather icons render naturally (they are usually colorful) -->
                <img id="weather-icon" src="" alt="Weather Icon" class="w-32 h-32 drop-shadow-md">
            </div>
            
            <div class="text-6xl font-bold text-emerald-900 mb-8 drop-shadow-sm">
                <span id="temperature">22</span>°C
            </div>

            <div class="grid grid-cols-2 gap-4 w-full">
                <div class="bg-emerald-50/80 rounded-2xl p-4 flex items-center gap-3 border border-emerald-100 backdrop-blur-md">
                    <div class="bg-emerald-100 w-10 h-10 rounded-full flex items-center justify-center text-emerald-600">
                        <i class="fas fa-tint"></i>
                    </div>
                    <div>
                        <p class="text-emerald-700/80 text-xs uppercase tracking-wider font-semibold">Humidity</p>
                        <p id="humidity" class="text-emerald-900 font-bold text-xl">45%</p>
                    </div>
                </div>
                <div class="bg-emerald-50/80 rounded-2xl p-4 flex items-center gap-3 border border-emerald-100 backdrop-blur-md">
                    <div class="bg-emerald-100 w-10 h-10 rounded-full flex items-center justify-center text-emerald-600">
                        <i class="fas fa-wind"></i>
                    </div>
                    <div>
                        <p class="text-emerald-700/80 text-xs uppercase tracking-wider font-semibold">Wind</p>
                        <p class="text-emerald-900 font-bold text-xl">Moderate</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
